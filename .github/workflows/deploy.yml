name: Actualizar Partidos y Desplegar a GitHub Pages

on:
  push:
    branches: ["main", "master"]
    paths-ignore:
      - 'frontend/data.json'
  schedule:
    - cron: '*/10 * * * *' # Cada 10 minutos
  workflow_dispatch: # Permite correrlo manualmente con un botón

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Buscar Partidos en Vivo (Ejecutando IA)
        run: |
          python backend/data_generator.py
          
      - name: Guardar datos en el repositorio
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/data.json
          git commit -m "Auto-update match data" || exit 0
          git push || echo "No changes to push or push failed"
          
      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4
        
      - name: Preparar carpeta frontend/
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend'
          
      - name: Desplegar a la Nube (GitHub Pages)
        id: deployment
        uses: actions/deploy-pages@v4
